# temp-front nginx — 정적 파일 서빙 + /api 리버스 프록시.
#
# 주의:
# - 빌드 산출물은 /usr/share/nginx/html 에 있다 (Dockerfile 참조).
# - vite dev 와 동일한 UX 를 위해 /api 요청은 백엔드 dev 엔드포인트로 포워딩.
#   브라우저 입장에서 same-origin 이 되므로 CORS 세팅 불필요.
# - temp.gakhalmo.klr.kr 자체는 내부망 전용 ingress (dev 용 테스트 프론트) 이므로
#   아웃바운드 DNS 는 cluster-internal resolver 가 아닌 공개 DNS 로 해석되어야 한다.
#   → nginx resolver 는 public DNS(8.8.8.8/1.1.1.1) 로 지정.

# Connection 헤더 정규화 — $http_upgrade 가 비어있으면 'close', WS 요청이면 'upgrade'.
# server {} 외부 map 으로 선언해야 nginx 가 한 번만 평가하고 모든 location 에서 재사용.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    # Public DNS 로 api.dev.gakhalmo.klr.kr 해석. valid=300s 로 TTL 관리.
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;

    root /usr/share/nginx/html;
    index index.html;

    # /api 는 백엔드로 reverse proxy — dev 의 vite proxy 와 동일한 경로 구조 유지.
    # WebSocket upgrade 도 같은 경로(/api/v1/ws) 로 들어오므로 HTTP/1.1 + Upgrade
    # 헤더를 명시적으로 전달해야 한다 (기본값만으로는 FastAPI 가 일반 HTTP 로 해석 → 404).
    location /api/ {
        # nginx 가 DNS 를 기동 시점이 아닌 요청 시점에 해석하도록 변수 사용.
        # resolver 지시어와 조합해야 upstream 변경 시 nginx 재시작 없이 반영된다.
        set $upstream "https://api.dev.gakhalmo.klr.kr";

        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Host api.dev.gakhalmo.klr.kr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # WebSocket upgrade 전달 — 일반 HTTP 요청이면 $http_upgrade 가 비어있어
        # Connection 헤더는 'keep-alive' 와 같게 재기록되므로 부작용 없음.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600s;  # WS 장기 연결 지원
        proxy_connect_timeout 10s;
    }

    # SPA 아닌 static — 정확 파일 우선, 없으면 404. Vite 빌드 결과는 /index.html + /assets/.
    location / {
        try_files $uri $uri/ =404;
    }

    # 가볍게 캐시. HTML 은 no-cache (가끔 인덱스 바뀔 수 있음).
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
